server {
    listen 80;
    server_name _;

    location /api/users {
        default_type application/json;
        return 200 '{"id":1,"name":"Alice","email":"alice@example.com"}';
    }

    location /api/orders {
        default_type application/json;
        return 200 '{"order_id":1001,"status":"completed","total":99.9}';
    }

    location /api/ {
        default_type application/json;
        return 200 '{"status":"ok","service":"mock-upstream"}';
    }

    location / {
        default_type application/json;
        return 404 '{"error":"not found"}';
    }
}