name: Release

on:
  push:
    tags:
      - "v[0-9]+.*"

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write
      packages: write

    steps:
      # Checkout source
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Rust toolchain
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      # Cargo cache
      - name: Setup cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          key: "${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}"

      # Formatting
      - name: Check formatting
        run: cargo fmt --all --check

      # Clippy
      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      # Install cargo-audit
      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      # Security audit
      - name: Run cargo audit
        run: cargo audit

      # Tests
      - name: Run tests
        run: cargo test --workspace --all-features --locked -- --test-threads=1

      # Build release binary
      - name: Build release binary
        run: cargo build --release --locked

      # Prepare release artifacts
      - name: Prepare release artifacts
        run: |
          mkdir -p dist

          cp target/release/kirin-gw dist/kirin-gw-linux-amd64

          tar -czf dist/kirin-gw-linux-amd64.tar.gz -C dist kirin-gw-linux-amd64

          cd dist
          sha256sum kirin-gw-linux-amd64.tar.gz > checksums.txt

      # Generate changelog
      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGELOG.md

      # Setup Docker Buildx
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Docker metadata
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-rc') && !contains(github.ref_name, '-beta') && !contains(github.ref_name, '-alpha') }}

      # Login to GitHub Container Registry
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build & push Docker image
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Create GitHub Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: false
          body: ${{ steps.git-cliff.outputs.changelog }}
          files: |
            dist/kirin-gw-linux-amd64.tar.gz
            dist/checksums.txt