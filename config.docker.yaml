# Kirin Gateway Docker 配置文件
server:
  listen: "0.0.0.0:8080"
  threads: 2

admin:
  listen: "0.0.0.0:7189"

routes:
  - route_id: "user-api"
    path: /api/users
    match_type: exact
    upstream: mock-service
    applicant: "admin"
    applied_at: "2026-05-06T00:00:00+08:00"
    description: "用户服务接口"
  - route_id: "order-api"
    path_prefix: /api/orders
    match_type: prefix
    upstream: mock-service
    applicant: "admin"
    applied_at: "2026-05-06T00:00:00+08:00"
    description: "订单服务接口"
  - route_id: "default-api"
    path_prefix: /api
    match_type: prefix
    upstream: mock-service
    applicant: "admin"
    applied_at: "2026-05-06T00:00:00+08:00"
    description: "默认前缀路由"

upstreams:
  mock-service:
    nodes:
      - addr: "mock-upstream:80"
        weight: 1

rate_limit:
  capacity: 1000
  refill_rate: 100