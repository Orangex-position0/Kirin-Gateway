# Kirin Gateway Configuration Template
# Copy this file to config.yaml and modify according to your environment

# ============================================================
# Server Settings
# ============================================================
server:
  # Gateway listen address, format: "ip:port"
  # - "0.0.0.0:6188" listens on all interfaces on port 6188
  # - "127.0.0.1:6188" listens on localhost only
  listen: "0.0.0.0:6188"

  # Worker thread count (optional)
  # - Defaults to the number of CPU cores when not set
  # - Recommended to tune manually in production based on load
  threads: 2

  # TLS configuration (optional — remove to use plain HTTP)
  # When enabled, the gateway listens in HTTPS mode and terminates TLS
  # tls:
  #   # TLS certificate file path (PEM format)
  #   cert_path: "/path/to/server.crt"
  #   # TLS private key file path (PEM format)
  #   key_path: "/path/to/server.key"

# ============================================================
# Admin API Settings (optional — remove this section to disable)
# ============================================================
# Provides a management API for runtime configuration, health checks, etc.
admin:
  # Admin API listen address
  listen: "0.0.0.0:6189"

# ============================================================
# Route Rules
# ============================================================
# Routes are matched top-to-bottom; the first matching rule wins.
# Two mutually exclusive matching modes per route:
#   - path:        Exact path match, e.g. "/api/users" matches only that path
#   - path_prefix: Prefix match, e.g. "/api/orders" matches all paths starting with it
routes:
  # Exact path match example
  - route_id: "user-route"
    path: /api/users
    match_type: exact
    upstream: user-service
    applicant: "developer"
    applied_at: "2026-04-22T00:00:00+08:00"
    description: "User service endpoint"

  # Prefix match example
  - route_id: "order-route"
    path_prefix: /api/orders
    match_type: prefix
    upstream: order-service
    applicant: "developer"
    applied_at: "2026-04-22T00:00:00+08:00"
    description: "Order service endpoint"

  # Fallback route: catches any /api request not matched above
  - route_id: "default-route"
    path_prefix: /api
    match_type: prefix
    upstream: default-service
    applicant: "developer"
    applied_at: "2026-04-22T00:00:00+08:00"
    description: "Default fallback route"

  # Regex match example (optional, requires auth)
  # - route_id: "admin-route"
  #   path: "/api/admin/.*"
  #   match_type: regex
  #   methods: ["GET", "POST"]
  #   upstream: admin-service
  #   is_auth: true
  #   applicant: "developer"
  #   applied_at: "2026-04-22T00:00:00+08:00"
  #   description: "Admin panel endpoint"

  # IP whitelist/blacklist example (optional)
  # - route_id: "internal-route"
  #   path: /api/internal/config
  #   match_type: exact
  #   upstream: config-service
  #   ip_whitelist:
  #     - "10.0.0.0/8"        # CIDR range
  #     - "172.16.0.0/12"
  #   ip_blacklist:
  #     - "10.0.0.100"        # Exact IP
  #   applicant: "admin"
  #   applied_at: "2026-05-01T09:00:00+08:00"
  #   description: "Internal config endpoint (IP restricted)"

  # Canary release example (stable version, 80% traffic)
  # - route_id: "user-stable"
  #   path: /api/v2/users
  #   match_type: exact
  #   upstream: user-service-v1
  #   canary:
  #     weight: 80
  #     match_rules: []

  # Canary release example (canary version, condition match + 20% weight + Cookie Sticky)
  # - route_id: "user-canary"
  #   path: /api/v2/users
  #   match_type: exact
  #   upstream: user-service-v2
  #   canary:
  #     weight: 20
  #     match_rules:
  #       - type: header          # Header condition match
  #         key: X-Canary
  #         value: "true"
  #       - type: cookie          # Cookie condition match
  #         key: env
  #         value: canary
  #       - type: query           # Query parameter match
  #         key: canary
  #         value: "true"
  #     stick: cookie              # Session affinity strategy: ip_hash or cookie
  #     sticky_cookie:
  #       name: kirin_canary       # Cookie name, defaults to "kirin_canary"
  #       path: /                  # Cookie Path, defaults to "/"
  #       max_age: 3600            # Expiry time in seconds, defaults to 3600
  #   applicant: "developer"
  #   applied_at: "2026-05-01T10:00:00+08:00"
  #   description: "Canary test version"

# ============================================================
# Upstream Services
# ============================================================
# Key is the service name referenced by routes' "upstream" field.
# Each upstream contains a set of backend nodes; the gateway load-balances across them.
upstreams:
  # Single-node example
  user-service:
    # Load balancing algorithm (optional, defaults to round_robin)
    # - round_robin: weighted round-robin
    # - consistent_hash: consistent hashing (routes requests to a fixed node by key)
    algorithm: round_robin
    nodes:
      - addr: "127.0.0.1:8081"
        weight: 1

  # Multi-node example (equal weights, round-robin distribution)
  order-service:
    algorithm: round_robin
    nodes:
      - addr: "127.0.0.1:8082"
        weight: 1
      - addr: "127.0.0.1:8083"
        weight: 1

  # Weighted example: first node gets 3/5 of traffic, second gets 2/5
  # default-service:
  #   nodes:
  #     - addr: "192.168.1.10:8090"
  #       weight: 3
  #     - addr: "192.168.1.11:8090"
  #       weight: 2

  default-service:
    algorithm: round_robin
    nodes:
      - addr: "127.0.0.1:8090"
        weight: 1

  # Upstream with health check example
  # health-service:
  #   algorithm: round_robin
  #   nodes:
  #     - addr: "127.0.0.1:8091"
  #       weight: 1
  #   # Health check configuration (optional, disabled when not set)
  #   health_check:
  #     # Check interval in seconds
  #     interval_secs: 5
  #     # Connection timeout in seconds (defaults to 3)
  #     timeout_secs: 3

  # Canary release companion upstreams example
  # user-service-v1:
  #   algorithm: round_robin
  #   nodes:
  #     - addr: "127.0.0.1:8081"
  #       weight: 1
  # user-service-v2:
  #   algorithm: round_robin
  #   nodes:
  #     - addr: "127.0.0.1:8091"
  #       weight: 1

# ============================================================
# Rate Limiting (optional — remove this section to disable)
# ============================================================
# Token-bucket algorithm for request rate control
rate_limit:
  # Bucket capacity — maximum burst size allowed
  # - Higher values permit more concurrent requests in a short window
  capacity: 100

  # Token refill rate — tokens added per second
  # - Controls the average throughput
  # - e.g. 10 means an average of 10 requests per second
  refill_rate: 10

# ============================================================
# JWT Authentication (optional — remove this section to disable)
# ============================================================
# When enabled, routes with is_auth: true require a valid JWT token
# auth:
#   # Signing algorithm, currently only RS256 is supported
#   algorithm: "RS256"
#   # RSA public key file path (PEM format)
#   public_key_path: "/path/to/public.pem"
#   # Expected token issuer (iss claim)
#   issuer: "your-issuer"
#   # JWT claims to forward to upstream (passed as X-User-{ClaimName} header)
#   claims_to_forward: ["sub", "exp"]
