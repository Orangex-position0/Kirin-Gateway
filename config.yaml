# Kirin Gateway Configuration file

server:
  listen: "0.0.0.0:7188"
  threads: 2
  # TLS 配置（可选，取消注释并填入证书路径即可启用 HTTPS）
  # tls:
  #   cert_path: "certs/server.crt"
  #   key_path: "certs/server.key"

admin:
  listen: "0.0.0.0:7189"

routes:
  # 正式路由
  - route_id: "user-api-stable"
    path: "/api/users"
    match_type: "exact"
    upstream: "user-service-v1"
    applicant: "team-a"
    applied_at: "2026-05-07T00:00:00+08:00"
    description: "用户服务正式版本"
    canary:
      weight: 90

  # 灰度路由
  - route_id: "user-api-canary"
    path: "/api/users"
    match_type: "exact"
    upstream: "user-service-v2"
    applicant: "team-a"
    applied_at: "2026-05-07T00:00:00+08:00"
    description: "用户服务灰度版本"
    canary:
      weight: 10
      match:
        - type: "header"
          key: "X-Canary"
          value: "true"
        - type: "cookie"
          key: "env"
          value: "canary"

upstreams:
  user-service:
    nodes:
      - addr: "127.0.0.1:8081"
        weight: 1
  order-service:
    nodes:
      - addr: "127.0.0.1:8082"
        weight: 1
      - addr: "127.0.0.1:8083"
        weight: 1
  default-service:
    nodes:
      - addr: "127.0.0.1:8090"
        weight: 1

rate_limit:
  capacity: 100
  refill_rate: 10